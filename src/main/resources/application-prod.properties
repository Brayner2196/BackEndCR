# Application Configuration
spring.application.name=residential-complex-multitenant

# Server Configuration
server.port=8080

# H2 Database Configuration
#spring.datasource.url=jdbc:h2:mem:residentialdb
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console Configuration
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging Configuration
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO
logging.level.com.backendcr=DEBUG


# JWT Configuration
jwt.secret=71985568cb9f27a1b37d5fc2f5d8611f081fd2f91848d01568f896f91a01cb9b
jwt.expiration-ms=3600000