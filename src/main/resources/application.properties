# Application Configuration
spring.application.name=residential-complex-multitenant

# Server Configuration
server.port=8080

spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=true

spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jackson.time-zone=UTC
spring.jackson.serialization.write-dates-as-timestamps=false

# Logging Configuration
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO
logging.level.com.backendcr=DEBUG

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=900000
# 15 min access token | 30 dias refresh token
jwt.refresh-expiration-ms=2592000000

firebase.credentials.json=${FIREBASE_CREDENTIALS_JSON}
app.base-url=${APP_BASE_URL}
app.encryption.secret=${ENCRYPTION_SECRET}