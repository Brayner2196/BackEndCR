# Application Configuration
spring.application.name=residential-complex-multitenant

# Server Configuration
server.port=8080

spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jackson.time-zone=UTC
spring.jackson.serialization.write-dates-as-timestamps=false

# Logging Configuration
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO
logging.level.com.backendcr=DEBUG

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=900000
# 15 min access token | 30 dias refresh token
jwt.refresh-expiration-ms=2592000000

firebase.credentials.json=${FIREBASE_CREDENTIALS_JSON}
app.base-url=${APP_BASE_URL}
app.encryption.secret=${ENCRYPTION_SECRET}

# ─── Actas por voz (Whisper local) ───────────────────────────────
# Límite de subida para el audio de la reunión (multipart).
spring.servlet.multipart.max-file-size=150MB
spring.servlet.multipart.max-request-size=155MB
# Comando/script de transcripción (faster-whisper vía Python).
whisper.python-command=${WHISPER_PYTHON:python3}
whisper.script-path=${WHISPER_SCRIPT:/app/scripts/whisper_transcribe.py}
# Modelo: tiny|base|small|medium|large-v3 (small = buen balance CPU/calidad en español)
whisper.model=${WHISPER_MODEL:small}
whisper.language=es
whisper.timeout-minutes=120
# Carpeta donde se guardan los audios originales (subcarpeta por tenant)
whisper.audio-dir=${WHISPER_AUDIO_DIR:/app/data/actas-audio}

# ─── Almacenamiento de archivos (Railway Bucket / S3-compatible) ──
# Variables inyectadas por Railway al vincular el servicio de Bucket.
# En local pueden quedar vacías: el S3Client no se activa hasta configurarlas.
bucket.name=${BUCKET_NAME:}
bucket.region=${BUCKET_REGION:us-east-1}
bucket.endpoint=${BUCKET_ENDPOINT:}
bucket.access-key=${BUCKET_ACCESS_KEY:}
bucket.secret-key=${BUCKET_SECRET_KEY:}

# ─── Documentos de interés general ───────────────────────────────
# Máximo de archivos adjuntos por documento.
documentos.max-archivos=${DOCUMENTOS_MAX_ARCHIVOS:10}
# Tamaño máximo por archivo NO-video (pdf, word, excel, imagen), en MB.
documentos.max-size-general-mb=${DOCUMENTOS_MAX_SIZE_GENERAL_MB:15}
# Tamaño máximo por video, en MB (la duración se limita en el cliente Flutter).
documentos.max-size-video-mb=${DOCUMENTOS_MAX_SIZE_VIDEO_MB:50}